services:

  # ─────────────────────────────────────────
  #  Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ob_inventory}
      POSTGRES_USER: ${POSTGRES_USER:-ob_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ob_user} -d ${POSTGRES_DB:-ob_inventory}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  #  Cache / Queue
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ─────────────────────────────────────────
  #  API (Fastify)
  # ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      WOO_STORE_URL: ${WOO_STORE_URL}
      WOO_API_KEY: ${WOO_API_KEY}
      WOO_API_SECRET: ${WOO_API_SECRET}
      WOO_WEBHOOK_SECRET: ${WOO_WEBHOOK_SECRET}
      WOO_PLUGIN_API_KEY: ${WOO_PLUGIN_API_KEY}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────
  #  Worker (BullMQ)
  # ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      WOO_STORE_URL: ${WOO_STORE_URL}
      WOO_API_KEY: ${WOO_API_KEY}
      WOO_API_SECRET: ${WOO_API_SECRET}
      WOO_PLUGIN_API_KEY: ${WOO_PLUGIN_API_KEY}

  # ─────────────────────────────────────────
  #  Web (Vue 3 — served by nginx)
  # ─────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    expose:
      - "80"

  # ─────────────────────────────────────────
  #  Reverse Proxy (Caddy)
  # ─────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-}

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
